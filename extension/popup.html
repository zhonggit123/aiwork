<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>题库录入 AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <div class="header-tabs">
      <div class="tab-item active" id="tabAuto">自动录入</div>
      <div class="tab-item" id="tabAdvanced" style="display: none;">高级模式</div>
    </div>
    <div class="header-actions">
      <!-- 设置入口 -->
      <div class="header-icon" id="settingsToggle" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
    </div>

    <!-- 设置下拉面板 -->
    <div id="settingsDropdown" class="settings-dropdown hidden">
      <!-- 模型选择 -->
      <div class="settings-section">
        <div class="settings-section-title">AI 模型</div>
        <label class="settings-radio-item">
          <input type="radio" name="modelChoice" id="modelDefault" value="default" checked />
          <span id="modelDefaultLabel">默认模型</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="modelChoice" id="modelSeed" value="doubao-seed-2-0-pro-260215" />
          <span>Seed-2.0 Pro</span>
        </label>
      </div>

      <div class="settings-divider"></div>

      <!-- 功能开关 -->
      <div class="settings-section">
        <div class="settings-section-title">功能</div>
        <!-- 高级 JSON：导航到新页面 -->
        <div class="settings-nav-item" id="settingsAdvancedToggle">
          <span>高级 JSON 模式</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <label class="settings-toggle-item">
          <span>解析调试信息</span>
          <input type="checkbox" id="parseDebugMode" style="display:none;" />
          <div class="settings-toggle-switch" id="debugToggleSwitch"></div>
        </label>
      </div>

      <div class="settings-divider"></div>

      <!-- 默认媒体 URL -->
      <div class="settings-section">
        <div class="settings-section-title">默认媒体 URL</div>
        <input id="defaultAudioUrl" type="text" class="settings-input" placeholder="音频 mp3 地址" />
        <input id="defaultImageUrl" type="text" class="settings-input" placeholder="图片 jpg/png 地址" style="margin-top:6px;" />
      </div>
    </div>
  </header>

  <main>
    <!-- State: Not Detected -->
    <div id="whenNotDetected" class="not-detected">
      <div class="icon-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
      </div>
      <h2>未检测到录题页面</h2>
      <p>请确保当前页面是驰声录题或其他支持的题库页面</p>
      
      <button id="openOurUrl" class="btn btn-primary" style="padding: 10px 24px;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        重新检测或打开页面
      </button>
    </div>

    <!-- State: Detected（主视图） -->
    <div id="onlyWhenDetected" class="hidden">

      <!-- 分析页面 -->
      <div class="action-card light-card" id="detect" title="分析录题页面结构">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <div class="action-content">
          <div class="action-title" id="detectTitle">分析页面</div>
          <div class="action-desc" id="detectDesc">识别当前录题表单</div>
        </div>
      </div>

      <div id="detect-result" class="message-area" style="display:none; margin-bottom:12px;"></div>

      <!-- 拖拽上传 -->
      <div class="drop-zone" id="dropZone">
          <!-- 默认/已选文件 -->
          <div id="dzNormal">
            <div class="drop-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="drop-text">点击或拖拽 Word 文件</div>
            <div class="drop-subtext">支持 .docx 格式，可多选</div>
            <div id="uploadStepHint" class="drop-subtext" style="font-size:11px; margin-top:6px; opacity:0.8;"></div>
          </div>

          <!-- 识别中 -->
          <div id="dzParsing" class="hidden">
            <div class="drop-icon drop-icon-spin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
                <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
                <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
              </svg>
            </div>
            <div class="drop-text">正在 AI 识别中…</div>
            <div id="dzParsingSubtext" class="drop-subtext">关闭弹窗不会中断</div>
            <button id="cancelParse" class="btn btn-primary" style="margin-top:16px; padding:4px 12px; font-size:12px;">
              中断识别
            </button>
          </div>

          <!-- 识别完成 -->
          <div id="dzDone" class="hidden">
            <div id="resultsTitle" class="results-title">识别完成</div>
            <div id="resultsMismatch" class="drop-subtext" style="color:var(--warning); margin-bottom:8px;"></div>
            <div id="resultsPreview" style="font-size:12px; color:var(--gray-600); max-height:80px; overflow-y:auto;"></div>
            <div class="results-actions">
              <button type="button" id="copyDebugInfo" class="btn-copy-list hidden">复制请求 Prompt</button>
              <button type="button" id="copyJson" class="btn-copy-list hidden">复制返回 JSON</button>
            </div>
            <button type="button" id="resetParseState" class="btn-reset">重置状态</button>
          </div>
        </div>
      </div>

      <input type="file" id="wordFiles" accept=".docx,.doc" multiple style="display:none;" />

      <!-- 解析并填入 -->
      <div class="grid-card dark card-full-row" id="uploadAndFill">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div>
          <div class="card-title">解析并填入</div>
          <div class="card-desc">自动转化并填表</div>
        </div>
      </div>

      <div id="msg" class="message-area"></div>
      <button id="copyErrBtn" class="btn btn-primary btn-full mt-2 hidden" style="margin-top:8px;">
        复制错误信息
      </button>

    </div>

    <!-- 高级 JSON 全屏页 -->
    <div id="advancedPage" class="advanced-page hidden">
      <div class="advanced-page-header">
        <button id="advancedPageBack" class="adv-back-btn" title="返回">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="adv-page-title">高级 JSON</span>
      </div>
      <div class="advanced-page-body">
        <textarea id="json" placeholder='粘贴 AI 返回的 JSON，例如：[{"question":"题干","answer":"A"}]'></textarea>

        <div class="flex gap-2">
          <button id="fill" class="btn btn-brand" style="flex:1;">仅填入当前页面</button>
          <button id="fillDebug" class="btn btn-primary debug-only" style="flex:1;">调试填充</button>
        </div>
        <div id="json-msg" class="message-area mt-2"></div>
      </div>
    </div>

    <!-- 占位，让 advancedPanel id 仍存在供 JS 引用 -->
    <div id="advancedPanel" class="hidden"></div>

  </main>

  <footer>
    <div class="footer-brand">
      <div class="footer-title">
        题库录入 AI
        <span id="statusBadge" class="status-dot"></span>
      </div>
      <div class="footer-subtitle">研发辅助扩展 v1.2</div>
    </div>
    <div class="footer-actions">
      <div id="jsonHistoryWrap" class="footer-history-wrap">
        <button type="button" id="jsonHistoryBtn" class="footer-history-btn" title="最近使用的 JSON，点击填充">
          <span id="fillCacheDot" class="footer-fill-dot hidden"></span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <div id="jsonHistoryDropdown" class="json-history-dropdown hidden"></div>
      </div>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
