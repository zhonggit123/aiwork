# 打包 Windows exe（与 build-windows-exe 相同，便于在 Actions 列表中找到）
name: 打包 Windows exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: pyinstaller 题库后端.spec

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: 题库后端-Windows
          path: dist/题库后端.exe
